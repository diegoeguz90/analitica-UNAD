services:
  backend:
    build: ./backend
    container_name: analytics_backend
    volumes:
      - ./data:/app/data
    ports:
      - "8083:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: analytics_frontend
    ports:
      - "8084:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - backend
